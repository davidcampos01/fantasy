  <polygon points="289,260 340,260 370,312 344,368 256,390 168,368 142,312 172,260 223,260" fill="none" stroke="#1a1a1a" stroke-width="7"/>
  <polygon points="310,196 356,160 406,190 400,248 370,268 340,260" fill="none" stroke="#1a1a1a" stroke-width="7"/>
  <polygon points="202,196 172,260 142,250 136,190 172,160" fill="none" stroke="#1a1a1a" stroke-width="7"/>
